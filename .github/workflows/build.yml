name: Build PocketCat APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout репозиторий
        uses: actions/checkout@v4

      - name: Установить Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Используем предустановленный sdkmanager, без setup-android
      - name: Установить компоненты Android SDK
        run: |
          # Соглашаемся с лицензиями
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses
          # Устанавливаем платформу, build-tools, NDK и CMake
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-33" \
            "build-tools;33.0.0" \
            "ndk;23.1.7779620" \
            "cmake;3.22.1"

      - name: Клонировать love-android шаблон
        run: git clone https://github.com/love2d/love-android.git --depth 1

      - name: Заменить ndkVersion в build.gradle на 23.1.7779620
        run: sed -i 's/ndkVersion ".*"/ndkVersion "23.1.7779620"/' love-android/app/build.gradle

      - name: Настроить local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > love-android/local.properties
          echo "ndk.dir=$ANDROID_SDK_ROOT/ndk/23.1.7779620" >> love-android/local.properties

      - name: Собрать .love и подготовить assets
        run: |
          mkdir -p love-android/app/src/main/assets
          zip -r game.love main.lua project.yml conf.lua icon.png 2>/dev/null || true
          cp game.love love-android/app/src/main/assets/game.love

      - name: Собрать APK (debug)
        working-directory: love-android
        run: ./gradlew assembleDebug

      - name: Загрузить APK как артефакт
        uses: actions/upload-artifact@v4
        with:
          name: PocketCat-APK
          path: love-android/app/build/outputs/apk/debug/app-debug.apk
