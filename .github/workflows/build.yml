name: Build PocketCat (Release Android + Portable Windows)

on:
  push:
  workflow_dispatch:

jobs:
  # ---------- Android Release ----------
  build-android-release:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: Cache NDK
        uses: actions/cache@v4
        with:
          path: ${{ env.ANDROID_HOME }}/ndk/25.2.9519653
          key: ndk-25.2.9519653-v2

      - name: Install NDK
        run: |
          if [ ! -d "$ANDROID_HOME/ndk/25.2.9519653" ]; then
            yes | sdkmanager "ndk;25.2.9519653"
          fi

      - name: Export NDK
        run: |
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV

      - name: Cache love-android
        uses: actions/cache@v4
        with:
          path: love-android
          key: love-android-src-v2

      - name: Clone love-android
        run: |
          if [ ! -f "love-android/gradlew" ]; then
            git clone --recursive --depth 1 https://github.com/love2d/love-android.git
          fi

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-v2

      # ---- Увеличение памяти для Gradle и отключение лишних фич ----
      - name: Configure Gradle
        run: |
          echo "org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=512m" >> love-android/gradle.properties
          echo "org.gradle.daemon=false" >> love-android/gradle.properties
          echo "org.gradle.parallel=false" >> love-android/gradle.properties
          echo "org.gradle.caching=true" >> love-android/gradle.properties
          # Отключаем задачи, которые могут потреблять память
          echo "android.enableJetifier=false" >> love-android/gradle.properties
          echo "android.useAndroidX=true" >> love-android/gradle.properties

      - name: Package game.love
        run: zip -9 -r game.love . -x "*.git*" -x ".github/*" -x "love-android/*" -x "*.yml"

      - name: Embed game
        run: |
          mkdir -p love-android/app/src/embed/assets
          cp game.love love-android/app/src/embed/assets/game.love
          ls -la love-android/app/src/embed/assets/

      - name: Force arm64 (and remove x86, armeabi)
        run: |
          sed -i '/abiFilters/d' love-android/app/build.gradle
          sed -i '/defaultConfig {/a\        ndk { abiFilters "arm64-v8a" }' love-android/app/build.gradle

      # ---------- Подпись релизной сборки ----------
      - name: Create keystore (if no secrets)
        id: create_keystore
        run: |
          if [ -z "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "Generating temporary keystore..."
            keytool -genkey -v -keystore release.keystore -alias pocketcat -keyalg RSA -keysize 2048 \
              -validity 10000 -dname "CN=PocketCat, OU=Dev, O=Dev, L=City, S=State, C=RU" \
              -storepass pocketcat -keypass pocketcat
            echo "KEYSTORE_BASE64=$(base64 -w0 release.keystore)" >> $GITHUB_ENV
            echo "KEYSTORE_PASSWORD=pocketcat" >> $GITHUB_ENV
            echo "KEY_ALIAS=pocketcat" >> $GITHUB_ENV
            echo "KEY_PASSWORD=pocketcat" >> $GITHUB_ENV
          else
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > release.keystore
            echo "KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
            echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> $GITHUB_ENV
            echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_ENV
          fi

      - name: Configure signing in build.gradle
        run: |
          cat << EOF >> love-android/app/build.gradle
          android {
              signingConfigs {
                  release {
                      storeFile file('../../release.keystore')
                      storePassword System.getenv("KEYSTORE_PASSWORD")
                      keyAlias System.getenv("KEY_ALIAS")
                      keyPassword System.getenv("KEY_PASSWORD")
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                      minifyEnabled false
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                      // Отключаем генерацию debug-метаданных для экономии памяти
                      debuggable false
                      jniDebuggable false
                  }
              }
          }
          EOF

      - name: Build Release APK (only arm64, no debug metadata)
        working-directory: love-android
        # Используем assembleEmbedRelease (вместо embedNoRecord, который включает debug-символы)
        run: ./gradlew assembleEmbedRelease --no-daemon --parallel --console=plain --max-workers=2

      - name: Collect APK
        run: |
          APK_FILE=$(find love-android/app/build/outputs -name "*.apk" | head -n 1)
          if [ -n "$APK_FILE" ]; then
            echo "Found APK: $APK_FILE"
            cp "$APK_FILE" PocketCat_Release.apk
          else
            echo "No APK found. Listing build outputs:"
            find love-android/app/build -type d 2>/dev/null || echo "No build directory"
            exit 1
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: PocketCat_Android_Release
          path: PocketCat_Release.apk
          compression-level: 0

  # ---------- Windows Portable (без изменений) ----------
  build-windows-portable:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Package game.love
        run: zip -9 -r game.love . -x "*.git*" -x ".github/*" -x "love-android/*" -x "*.yml"
      - name: Download LÖVE Windows 64-bit
        run: |
          wget -O love-windows.zip "https://github.com/love2d/love/releases/download/11.5/love-11.5-win64.zip"
          unzip love-windows.zip -d love-windows
      - name: Download LÖVE Windows 32-bit
        run: |
          wget -O love-windows32.zip "https://github.com/love2d/love/releases/download/11.5/love-11.5-win32.zip"
          unzip love-windows32.zip -d love-windows32
      - name: Create Portable EXE (64-bit)
        run: |
          mkdir -p dist/PocketCat64
          cp love-windows/love-11.5-win64/* dist/PocketCat64/
          cat game.love >> dist/PocketCat64/love.exe
          mv dist/PocketCat64/love.exe dist/PocketCat64/PocketCat.exe
      - name: Create Portable EXE (32-bit)
        run: |
          mkdir -p dist/PocketCat32
          cp love-windows32/love-11.5-win32/* dist/PocketCat32/
          cat game.love >> dist/PocketCat32/love.exe
          mv dist/PocketCat32/love.exe dist/PocketCat32/PocketCat32.exe
      - name: Install Wine and rcedit (for icon)
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y wine wine32 wine64
          wget -O rcedit-x64.exe https://github.com/electron/rcedit/releases/download/v2.0.0/rcedit-x64.exe
      - name: Set icon (if exists)
        run: |
          if [ -f "icon.ico" ]; then
            wine rcedit-x64.exe dist/PocketCat64/PocketCat.exe --set-icon icon.ico
            wine rcedit-x64.exe dist/PocketCat32/PocketCat32.exe --set-icon icon.ico
          fi
        continue-on-error: true
      - name: Create ZIP archive
        run: |
          cd dist
          zip -9 -r ../PocketCat_Windows_Portable.zip PocketCat64/ PocketCat32/
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: PocketCat_Windows_Portable
          path: PocketCat_Windows_Portable.zip
          compression-level: 0
